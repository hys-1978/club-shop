<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>社团小卖部</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .product { border: 1px solid #ccc; margin: 10px; padding: 10px; border-radius: 5px; }
        .add-form { margin: 20px 0; padding: 15px; background: #f0f0f0; border-radius: 5px; }
        input, button { margin: 5px; padding: 8px; }
        button { background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>
    <h1>社团文创商品管理</h1>

    <div class="add-form">
        <h3>添加新商品</h3>
        <input type="text" id="name" placeholder="商品名称" />
        <input type="number" id="price" placeholder="价格（元）" step="0.01" />
        <input type="number" id="stock" placeholder="库存数量" />
        <button onclick="addProduct()">添加商品</button>
    </div>

    <h2>商品列表</h2>
    <div id="product-list"></div>

    <script>
        async function fetchProducts() {
            const res = await fetch('/api/products');
            const products = await res.json();
            const container = document.getElementById('product-list');
            container.innerHTML = '';
            if (products.length === 0) {
                container.innerHTML = '<p>暂无商品，请添加。</p>';
                return;
            }
            products.forEach(p => {
                const div = document.createElement('div');
                div.className = 'product';
                div.innerHTML = `<strong>${p.name}</strong> - ￥${p.price} (库存: ${p.stock})`;
                container.appendChild(div);
            });
        }

        async function addProduct() {
            const name = document.getElementById('name').value;
            const price = parseFloat(document.getElementById('price').value);
            const stock = parseInt(document.getElementById('stock').value);
            if (!name || isNaN(price) || isNaN(stock)) {
                alert('请完整填写商品名称、价格和库存');
                return;
            }
            const res = await fetch('/api/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, price, stock })
            });
            if (res.ok) {
                alert('添加成功！');
                document.getElementById('name').value = '';
                document.getElementById('price').value = '';
                document.getElementById('stock').value = '';
                fetchProducts(); // 刷新列表
            } else {
                alert('添加失败，请重试');
            }
        }

        // 页面加载时获取商品列表
        fetchProducts();
    </script>
</body>
</html>
